<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Ideas — by Bindu Sreeram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #faf6ef;
            --ivory-deep: #f1e8d8;
            --charcoal: #211d19;
            --charcoal-soft: #6b6259;
            --gold: #b8935a;
            --gold-light: #dfc79a;
            --gold-deep: #8a6a3c;
            --hairline: rgba(184, 147, 90, 0.35);
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background: linear-gradient(180deg, var(--ivory) 0%, #f4eee2 100%);
            color: var(--charcoal);
            display: flex;
            flex-direction: column;
        }
        header.site-header {
            text-align: center;
            padding: 44px 16px 28px;
            flex: 0 0 auto;
            background: linear-gradient(180deg, #fffdf9 0%, var(--ivory) 100%);
            border-bottom: 1px solid var(--hairline);
            position: relative;
        }
        .ornament {
            font-size: 11px;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        header.site-header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(30px, 5vw, 48px);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(120deg, var(--charcoal) 0%, var(--gold-deep) 45%, var(--charcoal) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .byline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 18px;
            letter-spacing: .5px;
            color: var(--gold-deep);
            margin: 10px 0 0;
        }
        .byline strong {
            font-style: normal;
            font-weight: 600;
            color: var(--charcoal);
        }
        .divider {
            width: 130px;
            height: 1px;
            margin: 20px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position: relative;
        }
        .divider::after {
            content: "\25C6";
            position: absolute;
            top: -7px; left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--gold);
            background: var(--ivory);
            padding: 0 8px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--hairline);
            padding: 0 16px;
            background: var(--ivory);
            flex: 0 0 auto;
        }
        .tab-btn {
            background: none; border: none;
            border-bottom: 2px solid transparent;
            padding: 16px 26px; font-size: 12px; font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase; letter-spacing: 2.5px;
            color: var(--charcoal-soft); cursor: pointer;
            transition: color .2s, border-color .2s;
        }
        .tab-btn:hover { color: var(--charcoal); }
        .tab-btn.active { color: var(--charcoal); border-bottom-color: var(--gold); }

        .tab-panel { display: none; flex: 1 1 auto; overflow-y: auto; padding: 20px 24px 40px; }
        .tab-panel.active { display: block; }

        /* 5 columns; each row sized so 4 rows fill the viewport */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .card {
            position: relative;
            display: block;
            height: calc((100vh - 200px) / 4 - 12px);
            min-height: 120px;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: #fff;
            background: var(--charcoal);
            box-shadow: 0 2px 10px rgba(33, 29, 25, .10);
            border: 1px solid rgba(184, 147, 90, .18);
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(138, 106, 60, .28);
            border-color: var(--gold);
        }
        .card img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        /* Branded (no-thumbnail) tiles */
        .card.brand {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 8px; gap: 6px;
        }
        .card.brand .ico { font-size: 26px; font-weight: 800; }
        .card.brand .name {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .brand.instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
        .brand.facebook  { background: #1877f2; }
        .brand.threads   { background: #101010; }
        .brand.pinterest { background: #e60023; }
        .brand.link      { background: #4a453e; }

        /* platform badge on thumbnail cards */
        .badge {
            position: absolute; top: 8px; left: 8px;
            background: rgba(33, 29, 25, .72);
            font-family: 'Inter', sans-serif;
            font-size: 9px; font-weight: 700;
            padding: 3px 7px; border-radius: 3px;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .play {
            position: absolute; inset: 0; margin: auto;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(33, 29, 25, .55);
            border: 1px solid rgba(223, 199, 154, .6);
            border-radius: 50%;
            pointer-events: none;
        }
        .play::after {
            content: ""; margin-left: 3px;
            border-left: 12px solid var(--gold-light);
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }
        .count {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 14px; color: var(--charcoal-soft);
            padding: 6px 4px 10px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 15px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--charcoal);
            display: flex; align-items: center; gap: 12px;
            margin: 30px 4px 6px;
            padding-top: 22px;
            border-top: 1px solid var(--hairline);
        }
        .section-title::before {
            content: "";
            width: 26px; height: 1px;
            background: var(--gold);
            display: inline-block;
        }
        .section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
        .card.photo img { object-fit: cover; }

        /* Lightbox for viewing gallery photos at full resolution */
        .lightbox {
            display: none;
            position: fixed; inset: 0;
            background: rgba(17, 15, 13, .94);
            z-index: 1000;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 95vw; max-height: 95vh;
            width: auto; height: auto;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            image-rendering: auto;
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 28px;
            color: var(--gold-light); font-family: 'Playfair Display', serif;
            font-size: 34px; line-height: 1; font-weight: 600;
            background: none; border: none; cursor: pointer;
            transition: color .15s;
        }
        .lightbox-close:hover { color: #fff; }
    </style>
</head>

    // ---------- rendering ----------
    function classify(url) {
        let m;
        if ((m = url.match(/(?:youtube\.com\/shorts\/|youtu\.be\/)([\w-]+)/))) {
            return { type: "youtube", id: m[1], key: "yt:" + m[1] };
        }
        if ((m = url.match(/instagram\.com\/(?:reel|p)\/([\w-]+)/))) {
            return { type: "instagram", key: "ig:" + m[1] };
        }
        if ((m = url.match(/facebook\.com\/share\/[rv]\/([\w-]+)/))) {
            return { type: "facebook", key: "fb:" + m[1] };
        }
        if ((m = url.match(/threads\.(?:com|net)\/.*\/post\/([\w-]+)/))) {
            return { type: "threads", key: "th:" + m[1] };
        }
        if ((m = url.match(/pin\.it\/([\w-]+)/))) {
            return { type: "pinterest", key: "pin:" + m[1] };
        }
        return { type: "link", key: "url:" + url };
    }

    const META = {
        instagram: { cls: "instagram", ico: "\u{1F4F7}", name: "Instagram" },
        facebook:  { cls: "facebook",  ico: "f",  name: "Facebook" },
        threads:   { cls: "threads",   ico: "@",  name: "Threads" },
        pinterest: { cls: "pinterest", ico: "P",  name: "Pinterest" },
        link:      { cls: "link",      ico: "\u{1F517}", name: "Open link" }
    };

    const GROUP_ORDER = ["youtube", "instagram", "facebook", "pinterest", "threads", "link"];
    const GROUP_NAMES = {
        youtube: "YouTube", instagram: "Instagram", facebook: "Facebook",
        pinterest: "Pinterest", threads: "Threads", link: "Other Links"
    };

    function buildCard(url) {
        const info = classify(url);
        const a = document.createElement("a");
        a.className = "card";
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        if (info.type === "youtube") {
            const img = document.createElement("img");
            img.loading = "lazy";
            img.src = "https://i.ytimg.com/vi/" + info.id + "/hqdefault.jpg";
            img.alt = "YouTube Short";
            a.appendChild(img);
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.textContent = "YouTube";
            a.appendChild(badge);
            const play = document.createElement("span");
            play.className = "play";
            a.appendChild(play);
        } else {
            const meta = META[info.type];
            a.classList.add("brand", meta.cls);
            const ico = document.createElement("div");
            ico.className = "ico";
            ico.textContent = meta.ico;
            const name = document.createElement("div");
            name.className = "name";
            name.textContent = meta.name;
            a.appendChild(ico);
            a.appendChild(name);
        }
        return a;
    }

    function renderGrouped(containerId, links) {
        const seen = new Set();
        const groups = {};
        let dupes = 0;
        links.forEach(function (u) {
            const info = classify(u);
            if (seen.has(info.key)) { dupes++; return; }
            seen.add(info.key);
            (groups[info.type] = groups[info.type] || []).push(u);
        });

        const container = document.getElementById(containerId);

        if (dupes > 0) {
            const note = document.createElement("div");
            note.className = "count";
            note.textContent = dupes + " duplicate link(s) hidden";
            container.appendChild(note);
        }

        GROUP_ORDER.forEach(function (type) {
            const urls = groups[type];
            if (!urls || !urls.length) return;

            const heading = document.createElement("h2");
            heading.className = "section-title";
            heading.textContent = GROUP_NAMES[type] + " (" + urls.length + ")";
            container.appendChild(heading);

            const grid = document.createElement("div");
            grid.className = "grid";
            urls.forEach(function (u) { grid.appendChild(buildCard(u)); });
            container.appendChild(grid);
        });
    }

    function buildPhotoCard(filename) {
        const path = "Gallery/Bedroom/" + filename;
        const a = document.createElement("a");
        a.className = "card photo";
        a.href = path;
        a.dataset.full = path;
        const img = document.createElement("img");
        img.loading = "lazy";
        img.decoding = "async";
        img.src = path;
        img.alt = filename;
        a.appendChild(img);
        a.addEventListener("click", function (e) {
            e.preventDefault();
            openLightbox(path);
        });
        return a;
    }

    function renderPhotos(gridId, countId, filenames) {
        const grid = document.getElementById(gridId);
        filenames.forEach(function (f) { grid.appendChild(buildPhotoCard(f)); });
        document.getElementById(countId).textContent = filenames.length + " photos";
    }

    // ---------- lightbox (shows the original, full-resolution file) ----------
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    function openLightbox(path) {
        lightboxImg.src = path;
        lightbox.classList.add("open");
    }
    function closeLightbox() {
        lightbox.classList.remove("open");
        lightboxImg.src = "";
    }
    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeLightbox();
    });

    // ---------- tabs ----------
    document.querySelectorAll(".tab-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
            const target = btn.getAttribute("data-tab");
            document.querySelectorAll(".tab-btn").forEach(function (b) {
                b.classList.toggle("active", b === btn);
            });
            document.querySelectorAll(".tab-panel").forEach(function (p) {
                p.classList.toggle("active", p.id === target);
            });
        });
    });
