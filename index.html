    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Ideas — by Bindu Sreeram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --ivory: #faf6ef;
            --ivory-deep: #f1e8d8;
            --charcoal: #211d19;
            --charcoal-soft: #6b6259;
            --gold: #b8935a;
            --gold-light: #dfc79a;
            --gold-deep: #8a6a3c;
            --hairline: rgba(184, 147, 90, 0.35);
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background: linear-gradient(180deg, var(--ivory) 0%, #f4eee2 100%);
            color: var(--charcoal);
            display: flex;
            flex-direction: column;
        }
        header.site-header {
            text-align: center;
            padding: 44px 16px 28px;
            flex: 0 0 auto;
            background: linear-gradient(180deg, #fffdf9 0%, var(--ivory) 100%);
            border-bottom: 1px solid var(--hairline);
            position: relative;
        }
        .ornament {
            font-size: 11px;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        header.site-header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(30px, 5vw, 48px);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(120deg, var(--charcoal) 0%, var(--gold-deep) 45%, var(--charcoal) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .byline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 18px;
            letter-spacing: .5px;
            color: var(--gold-deep);
            margin: 10px 0 0;
        }
        .byline strong {
            font-style: normal;
            font-weight: 600;
            color: var(--charcoal);
        }
        .divider {
            width: 130px;
            height: 1px;
            margin: 20px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position: relative;
        }
        .divider::after {
            content: "\25C6";
            position: absolute;
            top: -7px; left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--gold);
            background: var(--ivory);
            padding: 0 8px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--hairline);
            padding: 0 16px;
            background: var(--ivory);
            flex: 0 0 auto;
        }
        .tab-btn {
            background: none; border: none;
            border-bottom: 2px solid transparent;
            padding: 16px 26px; font-size: 12px; font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase; letter-spacing: 2.5px;
            color: var(--charcoal-soft); cursor: pointer;
            transition: color .2s, border-color .2s;
        }
        .tab-btn:hover { color: var(--charcoal); }
        .tab-btn.active { color: var(--charcoal); border-bottom-color: var(--gold); }

        .tab-panel { display: none; flex: 1 1 auto; overflow-y: auto; padding: 20px 24px 40px; }
        .tab-panel.active { display: block; }

        /* Responsive grid - cards size themselves, no longer locked to a fixed viewport-based layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 18px;
        }
        .card {
            position: relative;
            display: block;
            aspect-ratio: 3 / 4;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: #fff;
            background: var(--charcoal);
            box-shadow: 0 2px 10px rgba(33, 29, 25, .10);
            border: 1px solid rgba(184, 147, 90, .18);
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(138, 106, 60, .28);
            border-color: var(--gold);
        }
        .card img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        /* Branded (no-thumbnail) tiles */
        .card.brand {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 8px; gap: 6px;
        }
        .card.brand .ico { font-size: 26px; font-weight: 800; }
        .card.brand .name {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .brand.instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
        .brand.facebook  { background: #1877f2; }
        .brand.threads   { background: #101010; }
        .brand.pinterest { background: #e60023; }
        .brand.link      { background: #4a453e; }

        /* platform badge on thumbnail cards */
        .badge {
            position: absolute; top: 8px; left: 8px;
            background: rgba(33, 29, 25, .72);
            font-family: 'Inter', sans-serif;
            font-size: 9px; font-weight: 700;
            padding: 3px 7px; border-radius: 3px;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .play {
            position: absolute; inset: 0; margin: auto;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(33, 29, 25, .55);
            border: 1px solid rgba(223, 199, 154, .6);
            border-radius: 50%;
            pointer-events: none;
        }
        .play::after {
            content: ""; margin-left: 3px;
            border-left: 12px solid var(--gold-light);
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }
        .count {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 14px; color: var(--charcoal-soft);
            padding: 6px 4px 10px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 15px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--charcoal);
            display: flex; align-items: center; gap: 12px;
            margin: 30px 4px 6px;
            padding-top: 22px;
            border-top: 1px solid var(--hairline);
        }
        .section-title::before {
            content: "";
            width: 26px; height: 1px;
            background: var(--gold);
            display: inline-block;
        }
        .section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
        .card.photo { aspect-ratio: 1 / 1; }
        .card.photo img { object-fit: cover; }

        /* Live third-party embeds (Instagram / Threads) render at their own natural
           size, so this section wraps freely instead of using the fixed grid. */
        .embed-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .embed-live { position: relative; min-width: 236px; }

        /* Pagination controls */
        .pager {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin: 28px 0 12px;
        }
        .pager button {
            font-family: 'Inter', sans-serif;
            background: none;
            border: 1px solid var(--hairline);
            color: var(--charcoal-soft);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .3px;
            padding: 8px 14px;
            min-width: 38px;
            border-radius: 20px;
            cursor: pointer;
            transition: all .15s;
        }
        .pager button:hover:not(:disabled) { border-color: var(--gold); color: var(--charcoal); }
        .pager button.active { background: var(--charcoal); color: var(--ivory); border-color: var(--charcoal); }
        .pager button:disabled { opacity: .35; cursor: default; }
        .pager .ellipsis {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--charcoal-soft);
            padding: 0 4px;
        }

        /* Per-card hide control - lets you permanently dismiss a broken or unwanted link */
        .hide-btn {
            position: absolute;
            top: 8px; right: 8px;
            width: 24px; height: 24px;
            border-radius: 50%;
            background: rgba(17, 15, 13, .6);
            color: #fff;
            border: none;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity .15s, background .15s;
            z-index: 5;
        }
        .card:hover .hide-btn,
        .embed-live:hover .hide-btn { opacity: 1; }
        .hide-btn:hover { background: var(--gold-deep); }

        /* Lightbox for viewing gallery photos at full resolution */
        .lightbox {
            display: none;
            position: fixed; inset: 0;
            background: rgba(17, 15, 13, .94);
            z-index: 1000;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 95vw; max-height: 95vh;
            width: auto; height: auto;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            image-rendering: auto;
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 28px;
            color: var(--gold-light); font-family: 'Playfair Display', serif;
            font-size: 34px; line-height: 1; font-weight: 600;
            background: none; border: none; cursor: pointer;
            transition: color .15s;
        }
        .lightbox-close:hover { color: #fff; }
    </style>

    // ---------- hidden-links persistence ----------
    // Some YouTube videos get deleted/made private, and some Instagram/Threads posts
    // become unavailable. Broken YouTube thumbnails are detected automatically; for
    // Instagram/Threads (rendered in a cross-origin iframe we can't inspect), a small
    // hide button on every card lets you dismiss anything by hand. Hidden items are
    // remembered across visits.
    const HIDDEN_STORAGE_KEY = "homeIdeasHiddenLinks";
    const hiddenKeys = (function () {
        try { return new Set(JSON.parse(localStorage.getItem(HIDDEN_STORAGE_KEY) || "[]")); }
        catch (e) { return new Set(); }
    })();
    function persistHidden() {
        try { localStorage.setItem(HIDDEN_STORAGE_KEY, JSON.stringify(Array.from(hiddenKeys))); }
        catch (e) { /* localStorage unavailable - hiding still works for this session */ }
    }
    function makeHideBtn(onClick) {
        const btn = document.createElement("button");
        btn.className = "hide-btn";
        btn.type = "button";
        btn.title = "Hide this";
        btn.setAttribute("aria-label", "Hide this item");
        btn.textContent = "×";
        btn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            onClick();
        });
        return btn;
    }

    // ---------- pagination ----------
    // Renders one page of items at a time so the initial load only ever creates a
    // handful of DOM nodes/network requests per section, however many links it holds.
    function renderPaginated(container, entries, pageSize, itemsClassName, cardFactory, label) {
        let list = entries.filter(function (e) { return !hiddenKeys.has(e.key); });
        let page = 0;

        const countEl = document.createElement("div");
        countEl.className = "count";
        const itemsEl = document.createElement("div");
        itemsEl.className = itemsClassName;
        const pagerEl = document.createElement("div");
        pagerEl.className = "pager";

        container.appendChild(countEl);
        container.appendChild(itemsEl);
        container.appendChild(pagerEl);

        function totalPages() { return Math.max(1, Math.ceil(list.length / pageSize)); }

        function onHide(key) {
            hiddenKeys.add(key);
            persistHidden();
            list = list.filter(function (e) { return e.key !== key; });
            if (page > totalPages() - 1) page = totalPages() - 1;
            render();
        }

        function goTo(p) {
            page = Math.max(0, Math.min(totalPages() - 1, p));
            render();
            countEl.scrollIntoView({ block: "start", behavior: "smooth" });
        }

        function renderPager() {
            pagerEl.innerHTML = "";
            const tp = totalPages();
            if (tp <= 1) return;

            const prev = document.createElement("button");
            prev.textContent = "‹ Prev";
            prev.disabled = page === 0;
            prev.addEventListener("click", function () { goTo(page - 1); });
            pagerEl.appendChild(prev);

            const keep = new Set([0, tp - 1, page, page - 1, page + 1]);
            const pages = Array.from(keep).filter(function (p) { return p >= 0 && p < tp; }).sort(function (a, b) { return a - b; });

            let last = -1;
            pages.forEach(function (p) {
                if (last !== -1 && p - last > 1) {
                    const dots = document.createElement("span");
                    dots.className = "ellipsis";
                    dots.textContent = "···";
                    pagerEl.appendChild(dots);
                }
                const btn = document.createElement("button");
                btn.textContent = String(p + 1);
                if (p === page) btn.className = "active";
                btn.addEventListener("click", function () { goTo(p); });
                pagerEl.appendChild(btn);
                last = p;
            });

            const next = document.createElement("button");
            next.textContent = "Next ›";
            next.disabled = page === tp - 1;
            next.addEventListener("click", function () { goTo(page + 1); });
            pagerEl.appendChild(next);
        }

        function render() {
            itemsEl.innerHTML = "";
            const start = page * pageSize;
            list.slice(start, start + pageSize).forEach(function (entry) {
                itemsEl.appendChild(cardFactory(entry, onHide));
            });
            const tp = totalPages();
            countEl.textContent = list.length + " " + label + (tp > 1 ? " · page " + (page + 1) + " of " + tp : "");
            renderPager();
        }

        render();
    }

    // ---------- rendering ----------
    function classify(url) {
        let m;
        if ((m = url.match(/(?:youtube\.com\/shorts\/|youtu\.be\/)([\w-]+)/))) {
            return { type: "youtube", id: m[1], key: "yt:" + m[1] };
        }
        if ((m = url.match(/instagram\.com\/(?:reel|p)\/([\w-]+)/))) {
            return { type: "instagram", key: "ig:" + m[1] };
        }
        if ((m = url.match(/facebook\.com\/share\/[rv]\/([\w-]+)/))) {
            return { type: "facebook", key: "fb:" + m[1] };
        }
        if ((m = url.match(/threads\.(?:com|net)\/.*\/post\/([\w-]+)/))) {
            return { type: "threads", key: "th:" + m[1] };
        }
        if ((m = url.match(/pin\.it\/([\w-]+)/))) {
            return { type: "pinterest", key: "pin:" + m[1] };
        }
        return { type: "link", key: "url:" + url };
    }

    const META = {
        instagram: { cls: "instagram", ico: "\u{1F4F7}", name: "Instagram" },
        facebook:  { cls: "facebook",  ico: "f",  name: "Facebook" },
        threads:   { cls: "threads",   ico: "@",  name: "Threads" },
        pinterest: { cls: "pinterest", ico: "P",  name: "Pinterest" },
        link:      { cls: "link",      ico: "\u{1F517}", name: "Open link" }
    };

    const GROUP_ORDER = ["youtube", "instagram", "facebook", "pinterest", "threads", "link"];
    const GROUP_NAMES = {
        youtube: "YouTube", instagram: "Instagram", facebook: "Facebook",
        pinterest: "Pinterest", threads: "Threads", link: "Other Links"
    };

    function buildCard(entry, onHide) {
        const url = entry.url;
        const info = classify(url);
        const a = document.createElement("a");
        a.className = "card";
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        if (info.type === "youtube") {
            const img = document.createElement("img");
            img.loading = "lazy";
            img.src = "https://i.ytimg.com/vi/" + info.id + "/hqdefault.jpg";
            img.alt = "YouTube Short";
            // A deleted/private video either 404s or falls back to YouTube's fixed
            // 120x90 "no thumbnail" placeholder - either way, treat it as broken.
            img.addEventListener("error", function () { onHide(info.key); });
            img.addEventListener("load", function () {
                if (img.naturalWidth === 120 && img.naturalHeight === 90) onHide(info.key);
            });
            a.appendChild(img);
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.textContent = "YouTube";
            a.appendChild(badge);
            const play = document.createElement("span");
            play.className = "play";
            a.appendChild(play);
        } else {
            const meta = META[info.type];
            a.classList.add("brand", meta.cls);
            const ico = document.createElement("div");
            ico.className = "ico";
            ico.textContent = meta.ico;
            const name = document.createElement("div");
            name.className = "name";
            name.textContent = meta.name;
            a.appendChild(ico);
            a.appendChild(name);
        }
        a.appendChild(makeHideBtn(function () { onHide(info.key); }));
        return a;
    }

    // ---------- live embeds (Instagram / Threads) ----------
    // These platforms only expose real thumbnails via their official embed widgets,
    // which render full post cards (not square thumbnails) and fetch from the platform
    // client-side. Pagination already caps each page at a handful of items, so embeds
    // render immediately rather than needing a separate lazy-load step.
    // (Pinterest's widget was tried too, but its dynamic-rebuild API never actually
    // fetches pin data for content added after the initial page load - a known
    // limitation of their widget - so Pinterest keeps the branded tile instead. And
    // since these render inside a cross-origin iframe, a "post not available" state
    // can't be detected automatically - the hide button on each card covers that.)
    const EMBED_TYPES = new Set(["instagram", "threads"]);

    function loadScriptOnce(src, id) {
        if (document.getElementById(id)) return;
        const s = document.createElement("script");
        s.id = id;
        s.async = true;
        s.src = src;
        document.body.appendChild(s);
    }

    function debounce(fn, wait) {
        let t;
        return function () {
            clearTimeout(t);
            t = setTimeout(fn, wait);
        };
    }

    const scheduleInstagramProcess = debounce(function () {
        if (window.instgrm && window.instgrm.Embeds) window.instgrm.Embeds.process();
    }, 150);

    const scheduleThreadsProcess = debounce(function () {
        // Threads' embed.js has no documented public "reprocess" API, but a script
        // tag re-executes every time it's inserted - so re-inserting it re-scans
        // the page for any unprocessed blockquotes.
        const s = document.createElement("script");
        s.async = true;
        s.src = "https://www.threads.com/embed.js";
        document.body.appendChild(s);
    }, 150);

    function buildLiveEmbed(entry, onHide) {
        const type = entry.type;
        const url = entry.url;
        const wrapper = document.createElement("div");
        wrapper.className = "embed-live";

        if (type === "instagram") {
            wrapper.innerHTML =
                '<blockquote class="instagram-media" data-instgrm-permalink="' + url +
                '" data-instgrm-version="14" style="margin:0;"></blockquote>';
            scheduleInstagramProcess();
        } else if (type === "threads") {
            wrapper.innerHTML =
                '<blockquote class="text-post-media" data-text-post-permalink="' + url +
                '" data-text-post-version="0" style="margin:0;"></blockquote>';
            scheduleThreadsProcess();
        }
        wrapper.appendChild(makeHideBtn(function () { onHide(entry.key); }));
        return wrapper;
    }

    function renderGrouped(containerId, links) {
        const seen = new Set();
        const groups = {};
        let dupes = 0;
        links.forEach(function (u) {
            const info = classify(u);
            if (seen.has(info.key)) { dupes++; return; }
            seen.add(info.key);
            (groups[info.type] = groups[info.type] || []).push(u);
        });

        if (groups.instagram) loadScriptOnce("https://www.instagram.com/embed.js", "instagram-embed-script");
        if (groups.threads) loadScriptOnce("https://www.threads.com/embed.js", "threads-embed-script");

        const container = document.getElementById(containerId);

        if (dupes > 0) {
            const note = document.createElement("div");
            note.className = "count";
            note.textContent = dupes + " duplicate link(s) hidden";
            container.appendChild(note);
        }

        GROUP_ORDER.forEach(function (type) {
            const urls = groups[type];
            if (!urls || !urls.length) return;

            const heading = document.createElement("h2");
            heading.className = "section-title";
            heading.textContent = GROUP_NAMES[type];
            container.appendChild(heading);

            const isEmbed = EMBED_TYPES.has(type);
            const entries = urls.map(function (u) { return { url: u, key: classify(u).key, type: type }; });
            const pageSize = isEmbed ? 9 : 24;

            renderPaginated(
                container, entries, pageSize, isEmbed ? "embed-row" : "grid",
                isEmbed ? buildLiveEmbed : buildCard,
                GROUP_NAMES[type].toLowerCase()
            );
        });
    }

    function buildPhotoCard(entry, onHide) {

        const img = document.createElement("img");

        lightboxImg.src = "";
    }
    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeLightbox();
    });

    // ---------- tabs ----------
    document.querySelectorAll(".tab-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
            const target = btn.getAttribute("data-tab");
            document.querySelectorAll(".tab-btn").forEach(function (b) {
                b.classList.toggle("active", b === btn);
            });
            document.querySelectorAll(".tab-panel").forEach(function (p) {
                p.classList.toggle("active", p.id === target);
            });
        });
    });
    </script>
</body>
</html>
